<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Pro Drift Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0c0d12; font-family: 'Share Tech Mono', monospace; }

        #menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #161920 0%, #07090e 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            transition: opacity 0.4s ease;
        }

        .menu-title { color: #ffffff; font-size: 3.8rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; transform: skewX(-8deg); text-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        .menu-title span { color: #ffcc00; text-shadow: 0 0 25px rgba(255, 204, 0, 0.5); }

        .start-btn, .menu-btn {
            border: none;
            padding: 18px 70px;
            font-size: 2rem;
            font-weight: 900;
            transform: skewX(-10deg);
            cursor: pointer;
            border-radius: 10px;
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.2s ease;
        }

        .start-btn {
            background: #ffcc00;
            color: #04060b;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.45);
        }
        .start-btn:hover { background: #ffe066; transform: skewX(-10deg) scale(1.02); }
        .start-btn:active { transform: skewX(-10deg) scale(0.98); }

        .menu-btn {
            background: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 14px 50px;
            font-size: 1.4rem;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.15);
        }
        .menu-btn:hover { background: rgba(255, 204, 0, 0.1); }

        #gameCanvas {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-color: #0d0f14;
        }

        #ui-container, .g-force-container, #drift-hud, #score-board {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #score-board {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 10;
            background: rgba(12, 16, 26, 0.92);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }
        .score-label { font-size: 0.75rem; color: #8397af; letter-spacing: 2px; text-transform: uppercase; }
        .score-val { color: #ffffff; font-size: 2.2rem; font-weight: 900; }

        #drift-hud {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            font-weight: bold;
            pointer-events: none;
            width: 600px;
        }
        #drift-score {
            color: #ffffff;
            font-size: 3.5rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.7);
            transform: skewX(-8deg);
            transition: color 0.15s ease;
        }
        #drift-multiplier {
            color: #ffcc00;
            font-size: 1.6rem;
            text-shadow: 0 0 12px rgba(255,204,0,0.6);
            margin-top: -2px;
            transform: skewX(-6deg);
            visibility: hidden;
        }

        #ui-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            background: rgba(12, 16, 26, 0.92);
            padding: 22px 32px;
            border-radius: 16px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        }
        #speedometer {
            color: #ffcc00;
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -3px;
            transform: skewX(-10deg);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.6);
        }
        .hud-label {
            font-size: 0.85rem;
            color: #8397af;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
            transform: skewX(-6deg);
        }

        .g-force-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 10;
            pointer-events: none;
            background: rgba(12, 16, 26, 0.92);
            border-radius: 50%;
            width: 125px;
            height: 125px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        }
        .g-force-grid {
            position: absolute;
            width: 82%;
            height: 82%;
            border-radius: 50%;
            border: 1px dashed rgba(255, 204, 0, 0.3);
        }
        .g-dot {
            width: 10px;
            height: 10px;
            background-color: #ff2a2a;
            border-radius: 50%;
            box-shadow: 0 0 18px #ff2a2a;
            position: absolute;
            left: calc(50% - 5px);
            top: calc(50% - 5px);
            transition: left 0.05s ease, top 0.05s ease;
        }

        #shop-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #161920 0%, #07090e 100%);
            z-index: 101;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            overflow-y: auto;
        }

        .shop-content {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .car-card {
            background: rgba(12, 16, 26, 0.85);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 12px;
            width: 260px;
            text-align: center;
            transform: skewX(-4deg);
            transition: all 0.3s ease;
        }

        .car-card.selected {
            border: 2px solid #ffcc00;
            box-shadow: 0 0 20px rgba(255,204,0,0.2);
        }

        .car-card h3 { color: #fff; font-size: 1.6rem; margin-bottom: 10px; letter-spacing: 1px; }
        .car-card p { color: #8397af; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.5; }

        .car-btn {
            width: 100%;
            padding: 12px;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Share Tech Mono';
            transform: skewX(-6deg);
            border: none;
            transition: all 0.2s ease;
            border-radius: 6px;
        }

        .car-btn.selected {
            background: #ffcc00;
            color: #000;
        }

        .car-btn.owned {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
        }

        .car-btn.available {
            background: transparent;
            color: #ffcc00;
            border: 1px solid #ffcc00;
        }

        .car-btn:hover { transform: skewX(-6deg) scale(1.05); }

        .balance-display {
            color: #8397af;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-top: -10px;
        }

        .balance-display span {
            color: #ffcc00;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .exit-btn {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 12px 50px;
            font-size: 1.2rem;
            font-weight: 900;
            transform: skewX(-10deg);
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Share Tech Mono';
        }

        .exit-btn:hover { background: #f0f0f0; }

        #exitToMenuBtn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 6px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            font-family: 'Share Tech Mono';
            cursor: pointer;
            border-radius: 6px;
            transform: skewX(-8deg);
            margin-bottom: 15px;
            pointer-events: auto;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
        }

        #exitToMenuBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="menu-container">
    <div class="menu-title">Arena <span>Drift</span></div>
    <div class="balance-display">POINTS: <span id="menu-balance-val">000000</span></div>
    <button class="start-btn" id="startBtn">СТАРТ</button>
    <button class="menu-btn" id="openShopBtn">ГАРАЖ & МАГАЗИН</button>
</div>

<!-- ОКНО МАГАЗИНА / ГАРАЖА -->
<div id="shop-container">
    <div class="menu-title">ГАРАЖ <span>МАГАЗИН</span></div>
    <div class="balance-display">БАЛАНС: <span id="shop-balance-val">000000</span></div>

    <div class="shop-content" id="shop-content"></div>

    <button class="exit-btn" id="closeShopBtn">НАЗАД В МЕНЮ</button>
</div>

<!-- ИГРОВОЙ ХОЛСТ -->
<canvas id="gameCanvas"></canvas>

<!-- HUD ЭЛЕМЕНТЫ -->
<div id="score-board">
    <div class="score-label">TOTAL SCORE</div>
    <div id="total-score-val" class="score-val">000000</div>
</div>

<div class="g-force-container" id="gForceHUD">
    <div class="g-force-grid"></div>
    <div id="gDot" class="g-dot"></div>
</div>

<div id="drift-hud">
    <div id="drift-score">DRIVE AND DRIFT</div>
    <div id="drift-multiplier">x1.0 MULTIPLIER</div>
</div>

<div id="ui-container">
    <button id="exitToMenuBtn">В МЕНЮ</button>
    <div id="speed-limit-label" class="hud-label">LIMIT SPEED: 210 KM/H</div>
    <div id="speedometer">000</div>
</div>

<script>
    // ==========================================
    // КОНФИГУРАЦИЯ И ДАННЫЕ
    // ==========================================
    const carSpecs = {
        stock:    { maxSpeedPhys: 13.12, power: 0.22, maxSpeedHUD: 210, color: '#ffcc00' },
        audi:     { maxSpeedPhys: 18.12, power: 0.29, maxSpeedHUD: 290, color: '#536271' },
        porsche:  { maxSpeedPhys: 19.18, power: 0.30, maxSpeedHUD: 299, color: '#e60000' },
        nissan:   { maxSpeedPhys: 19.87, power: 0.31, maxSpeedHUD: 310, color: '#ffffff' },
        lambo:    { maxSpeedPhys: 21.87, power: 0.35, maxSpeedHUD: 350, color: '#ff3333' },
        corvette: { maxSpeedPhys: 22.87, power: 0.37, maxSpeedHUD: 360, color: '#ffdd00' },
        koenig:   { maxSpeedPhys: 30.00, power: 0.50, maxSpeedHUD: 480, color: '#00e5ff' },
        mark2:    { maxSpeedPhys: 16.50, power: 0.28, maxSpeedHUD: 275, color: '#fcfcfc' },

    };


    const carNames = {
        stock: 'BMW M8',
        audi: 'AUDI R8',
        porsche: 'PORSCHE 911',
        lambo: 'LAMBORGHINI',
        nissan: 'NISSAN GT-R',
        corvette: 'CORVETTE',
        koenig: 'KOENIGSEGG',
        mark2: 'TOYOTA MARK II',

    };


    const carPrices = {
        stock: 0,
        audi: 100000,
        porsche: 619000,
        lambo: 200000,
        nissan: 150000,
        corvette: 250000,
        koenig: 1000000,
        mark2: 85000,

    };

    const carDimensions = {
        stock:    { w: 14, h: 25, frontY: -16, backY: 14, wheelW: 14 },
        audi:     { w: 16, h: 33, frontY: -22, backY: 21, wheelW: 16 },
        porsche:  { w: 15, h: 28, frontY: -18, backY: 17, wheelW: 15 },
        lambo:    { w: 18, h: 30, frontY: -18, backY: 18, wheelW: 18 },
        nissan:   { w: 15, h: 25, frontY: -16, backY: 14, wheelW: 15 },
        corvette: { w: 16, h: 25, frontY: -16, backY: 14, wheelW: 16 },
        koenig:   { w: 15, h: 34, frontY: -20, backY: 22, wheelW: 15 },
        mark2: { w: 16, h: 31, frontY: -20, backY: 19, wheelW: 16 }

    };


    // ==========================================
    // АУДИО СИСТЕМА
    // ==========================================
    let audioCtx = null;
    let motorOsc = null;
    let motorGain = null;
    let screechNoise = null;
    let screechGain = null;
    let screechFilter = null;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        motorOsc = audioCtx.createOscillator();
        motorGain = audioCtx.createGain();
        motorOsc.type = 'sawtooth';
        motorOsc.frequency.setValueAtTime(45, audioCtx.currentTime);
        motorGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

        let motorFilter = audioCtx.createBiquadFilter();
        motorFilter.type = 'lowpass';
        motorFilter.frequency.setValueAtTime(180, audioCtx.currentTime);

        motorOsc.connect(motorFilter);
        motorFilter.connect(motorGain);
        motorGain.connect(audioCtx.destination);
        motorOsc.start();

        let bufferSize = audioCtx.sampleRate * 2;
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        screechNoise = audioCtx.createBufferSource();
        screechNoise.buffer = buffer;
        screechNoise.loop = true;

        screechGain = audioCtx.createGain();
        screechGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

        screechFilter = audioCtx.createBiquadFilter();
        screechFilter.type = 'lowpass';
        screechFilter.frequency.setValueAtTime(320, audioCtx.currentTime);

        screechNoise.connect(screechFilter);
        screechFilter.connect(screechGain);
        screechGain.connect(audioCtx.destination);
        screechNoise.start();
    }

    function playCrashSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        let filter = audioCtx.createBiquadFilter();
        osc.type = 'sawtooth';
        filter.type = 'lowpass';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
        filter.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // ==========================================
    // ЭЛЕМЕНТЫ ИНТЕРФЕЙСА
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu-container');
    const startBtn = document.getElementById('startBtn');
    const shopContainer = document.getElementById('shop-container');
    const shopContent = document.getElementById('shop-content');
    const openShopBtn = document.getElementById('openShopBtn');
    const closeShopBtn = document.getElementById('closeShopBtn');
    const exitToMenuBtn = document.getElementById('exitToMenuBtn');

    const hudR = document.getElementById('ui-container');
    const hudL = document.getElementById('gForceHUD');
    const driftHud = document.getElementById('drift-hud');
    const scoreBoard = document.getElementById('score-board');
    const speedometer = document.getElementById('speedometer');
    const gDot = document.getElementById('gDot');
    const driftScoreEl = document.getElementById('drift-score');
    const driftMultEl = document.getElementById('drift-multiplier');
    const totalScoreVal = document.getElementById('total-score-val');
    const speedLimitLabel = document.getElementById('speed-limit-label');
    const menuBalanceVal = document.getElementById('menu-balance-val');
    const shopBalanceVal = document.getElementById('shop-balance-val');

    // ==========================================
    // СОСТОЯНИЕ ИГРЫ
    // ==========================================
    let isRunning = false;
    let width = window.innerWidth;
    let height = window.innerHeight;

    canvas.width = width;
    canvas.height = height;

    let ownedCars = JSON.parse(localStorage.getItem('drift_owned_cars')) || ['stock'];
    let currentCarModel = localStorage.getItem('drift_current_car') || 'stock';
    let totalPoints = parseInt(localStorage.getItem('drift_total_points')) || 0;

    let car = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        vx: 0,
        vy: 0,
        angle: 0,
        angularVelocity: 0,
        steerAngle: 0,
        speed: 0,
        power: 0.22,
        maxSpeedPhys: 13.12,
        brake: 0.35,
        drag: 0.03,
        maxSteer: 0.52
    };

    let currentDriftScore = 0;
    let driftMultiplier = 1.0;
    let isDrifting = false;
    let collisionTextTimer = 0;
    let collisionCooldown = 0;

    const keys = {
        w: false, a: false, s: false, d: false,
        ц: false, ф: false, ы: false, в: false,
        ' ': false
    };

    let smokeParticles = [];
    let tireTracks = [];
    let containers = [];
    const containerColors = ['#1d4ed8', '#b91c1c', '#047857', '#6b21a8', '#c2410c'];
    const minDistance = 320;

    // ==========================================
    // ГЕНЕРАЦИЯ МИРА
    // ==========================================
    function generateWorld() {
        containers = [];
        const roadLines = [];

        function checkCollisionFree(x, y) {
            let carDx = car.x - x;
            let carDy = car.y - y;
            if (Math.sqrt(carDx * carDx + carDy * carDy) < 400) return false;

            for (let i = 0; i < containers.length; i++) {
                let dx = containers[i].x - x;
                let dy = containers[i].y - y;
                if (Math.sqrt(dx * dx + dy * dy) < minDistance) return false;
            }
            return true;
        }

        for (let i = 0; i < 45; i++) {
            let valid = false;
            let cx = 0, cy = 0;
            let attempts = 0;

            while (!valid && attempts < 500) {
                cx = car.x + (Math.random() - 0.5) * 4000;
                cy = car.y + (Math.random() - 0.5) * 4000;
                if (checkCollisionFree(cx, cy)) valid = true;
                attempts++;
            }

            if (valid) {
                containers.push({
                    x: cx, y: cy, w: 120, h: 50,
                    angle: (Math.floor(Math.random() * 4) * Math.PI) / 2,
                    color: containerColors[Math.floor(Math.random() * containerColors.length)]
                });
            }
        }

        for(let i = 0; i < 60; i++) {
            roadLines.push({
                x: (Math.random() - 0.5) * 4000,
                y: (Math.random() - 0.5) * 4000,
                w: 8 + Math.random() * 6,
                h: 40 + Math.random() * 80,
                angle: Math.random() * Math.PI
            });
        }

        return roadLines;
    }

    let roadLines = generateWorld();

    // ==========================================
    // ЛОГИКА МАГАЗИНА
    // ==========================================
    function updateBalanceUI() {
        const formatted = totalPoints.toString().padStart(6, '0');
        menuBalanceVal.innerText = formatted;
        shopBalanceVal.innerText = formatted;
        totalScoreVal.innerText = formatted;
    }

    function generateShopCards() {
        shopContent.innerHTML = '';
        Object.keys(carSpecs).forEach(model => {
            const price = carPrices[model];
            const name = carNames[model];
            const spec = carSpecs[model];
            const owned = ownedCars.includes(model);
            const selected = currentCarModel === model;

            const card = document.createElement('div');
            card.className = 'car-card' + (selected ? ' selected' : '');
            card.innerHTML = `
                <h3>${name}</h3>
                <p>СКОРОСТЬ: <span style="color:#fff">${spec.maxSpeedHUD} КМ/Ч</span>${price > 0 ? `<br>ЦЕНА: <span style="color:#ffcc00">${price.toLocaleString()} PTS</span>` : ''}</p>
                <button class="car-btn ${selected ? 'selected' : owned ? 'owned' : 'available'}" id="buy-${model}-btn">
                    ${selected ? 'ВЫБРАНО' : owned ? 'ВЫБРАТЬ' : 'КУПИТЬ'}
                </button>
            `;
            shopContent.appendChild(card);

            card.querySelector(`#buy-${model}-btn`).addEventListener('click', () => handleCarClick(model, price));
        });
    }

    function handleCarClick(model, price) {
        if (ownedCars.includes(model)) {
            currentCarModel = model;
            localStorage.setItem('drift_current_car', model);
        } else {
            if (totalPoints >= price) {
                totalPoints -= price;
                ownedCars.push(model);
                currentCarModel = model;
                localStorage.setItem('drift_total_points', totalPoints);
                localStorage.setItem('drift_owned_cars', JSON.stringify(ownedCars));
                localStorage.setItem('drift_current_car', model);
            } else {
                alert("НЕДОСТАТОЧНО ОЧКОВ ДЛЯ ПОКУПКИ!");
                return;
            }
        }
        updateBalanceUI();
        generateShopCards();
    }

    // ==========================================
    // ОБРАБОТКА СОБЫТИЙ МЕНЮ
    // ==========================================
    startBtn.addEventListener('click', () => {
        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

        const spec = carSpecs[currentCarModel];
        const dims = carDimensions[currentCarModel];

        car.maxSpeedPhys = spec.maxSpeedPhys;
        car.power = spec.power;
        car.x = canvas.width / 2;
        car.y = canvas.height / 2;
        car.vx = 0;
        car.vy = 0;
        car.speed = 0;
        car.angle = 0;
        car.steerAngle = 0;
        car.angularVelocity = 0;
        isDrifting = false;
        collisionCooldown = 0;
        currentDriftScore = 0;
        driftMultiplier = 1.0;

        speedLimitLabel.innerText = `LIMIT SPEED: ${spec.maxSpeedHUD} KM/H`;

        menu.style.opacity = '0';
        setTimeout(() => {
            menu.style.display = 'none';
            canvas.style.opacity = '1';
            hudR.style.opacity = '1';
            hudL.style.opacity = '1';
            driftHud.style.opacity = '1';
            scoreBoard.style.opacity = '1';

            if (!isRunning) {
                isRunning = true;
                loop();
            }
        }, 400);
    });

    openShopBtn.addEventListener('click', () => {

    // ==========================================
    // КОЛЛИЗИИ И ФИЗИКА
    // ==========================================
    function checkCarCollisionWithContainer(box) {
        let boxAngle = box.angle || 0;
        let carCenterX = car.x;
        let carCenterY = car.y;

        let cx = box.x - carCenterX;
        let cy = box.y - carCenterY;

        let s = Math.sin(-boxAngle);
        let c = Math.cos(-boxAngle);

        let rx = cx * c - cy * s;
        let ry = cx * s + cy * c;

        const dims = carDimensions[currentCarModel];
        let carW = dims.w * 2;
        let carH = dims.h;

        let halfBoxW = (box.w || 120) / 2;
        let halfBoxH = (box.h || 50) / 2;
        let halfCarW = carW / 2;
        let halfCarH = carH / 2;

        let overlapX = (halfBoxW + halfCarW) - Math.abs(rx);
        let overlapY = (halfBoxH + halfCarH) - Math.abs(ry);

        if (overlapX > 0 && overlapY > 0) {
            if (overlapX < overlapY) {
                car.x += overlapX * Math.sign(rx) * -1 * c;
                car.y += overlapX * Math.sign(rx) * -1 * -s;
                car.vx *= -0.4;
            } else {
                car.x += overlapY * Math.sign(ry) * -1 * s;
                car.y += overlapY * Math.sign(ry) * -1 * c;
                car.vy *= -0.4;
            }
            car.speed *= -0.3;
            return true;
        }
        return false;
    }

    // ==========================================
    // РЕНДЕРИНГ
    // ==========================================
    function drawCar() {
        const dims = carDimensions[currentCarModel];
        const spec = carSpecs[currentCarModel];
        const { w: currentW, h: currentH } = dims;

        ctx.save();
        ctx.rotate(car.angle);

        // Тень
        ctx.fillStyle = 'rgba(5, 6, 8, 0.45)';
        ctx.fillRect(-currentW - 1, -currentH + 2, (currentW * 2) + 2, (currentH * 2) + 4);

        // Кузов
        ctx.fillStyle = spec.color;
        ctx.beginPath();

        if (currentCarModel === 'stock') {
            ctx.moveTo(-14, 25);
            ctx.lineTo(-14, -22);
            ctx.quadraticCurveTo(-14, -30, 0, -32);

        } else if (currentCarModel === 'porsche') {

            ctx.quadraticCurveTo(-currentW, 0, -currentW, -currentH + 12); // Плавный бок

        } else if (currentCarModel === 'nissan') {

        } else if (currentCarModel === 'corvette') {
            ctx.moveTo(-11, 12);
            ctx.lineTo(-11, -10);

        } else if (currentCarModel === 'audi') {
            ctx.moveTo(-13, -2);
            ctx.quadraticCurveTo(-11, -14, 0, -15);

            ctx.fillRect(-11, -2, 22, 18);

            ctx.lineTo(-11, -10);
            ctx.lineTo(11, -10);

        ctx.closePath();
        ctx.fill();


        // Лобовое стекло (наложение цвета)
        ctx.fillStyle = '#1e1e1e';
        if (currentCarModel === 'lambo') ctx.fillRect(-8, -10, 16, 14);
        else if (currentCarModel === 'koenig') ctx.fillRect(-9, -2, 18, 12);

            ctx.lineTo(-7, -18);

            ctx.moveTo(-14, 16);
            ctx.lineTo(-10, 18);
            ctx.lineTo(10, 18);

        } else if (currentCarModel === 'corvette') {
            ctx.fillRect(-18, 25, 36, 5);

        } else if (currentCarModel === 'corvette') {
            // Воздухозаборники на капоте
            ctx.fillStyle = '#0a0a0c';
            ctx.beginPath();
            ctx.arc(-10, 12, 3, 0, Math.PI * 2);
            ctx.arc(10, 12, 3, 0, Math.PI * 2);

        }

        // Задний спойлер
        ctx.fillStyle = '#111111';
        if (currentCarModel === 'lambo') {
            ctx.fillRect(-18, 30 - 3, 18 * 2, 4);
        } else if (currentCarModel === 'porsche') {
            ctx.fillRect(-12, currentH - 3, 24, 3); // Спойлер "Ducktail" для Порше
        } else if (currentCarModel === 'nissan') {
            ctx.fillRect(-15, 18 - 2, 30, 3);
        } else if (currentCarModel === 'corvette') {
            ctx.fillRect(-16, 26 - 2, 32, 3);
        } else if (currentCarModel === 'koenig') {
            ctx.fillRect(-15 - 3, 34 - 3, (15 * 2) + 6, 4);
            ctx.fillRect(-15 - 3, 34 - 7, 2, 5);
            ctx.fillRect(15 + 1, 34 - 7, 2, 5);
        } else if (currentCarModel === 'audi') {
            ctx.fillRect(-16 + 1, 33 - 2, (16 * 2) - 2, 2);
        } else {
            ctx.fillRect(-17, 25, 34, 5);
        }

        // Фары передние
        ctx.fillStyle = '#ffffff';
        if (currentCarModel === 'lambo') {
            ctx.fillRect(-18 + 2, -30 + 1, 6, 3);
            ctx.fillRect(18 - 8, -30 + 1, 6, 3);
        } else if (currentCarModel === 'porsche') {
            ctx.beginPath();
            ctx.arc(-9, -currentH + 3.5, 2.5, 0, Math.PI * 2);
            ctx.arc(9, -currentH + 3.5, 2.5, 0, Math.PI * 2);

        } else if (currentCarModel === 'nissan') {
            ctx.fillRect(-11, -30, 4, 2);
            ctx.fillRect(7, -30, 4, 2);
        } else if (currentCarModel === 'corvette') {
            ctx.fillRect(-11, -30, 4, 2);
            ctx.fillRect(7, -30, 4, 2);
        } else if (currentCarModel === 'koenig') {
            ctx.fillRect(-15 + 2, -34 + 3, 2, 6);
            ctx.fillRect(15 - 4, -34 + 3, 2, 6);
        } else if (currentCarModel === 'audi') {
            ctx.fillRect(-16 + 1, -33 + 1, 5, 2);
            ctx.fillRect(16 - 6, -33 + 1, 5, 2);
        } else {
            ctx.fillRect(-11, -30, 4, 2);

        // Стопы задние
        ctx.fillStyle = (keys.s || keys[' ']) ? '#ff1111' : '#550000';
        if (currentCarModel === 'lambo') {

            ctx.fillRect(-11, 24, 4, 2);
            ctx.fillRect(7, 24, 4, 2);
        } else if (currentCarModel === 'corvette') {
            ctx.fillRect(-11, 24, 4, 2);
            ctx.fillRect(7, 24, 4, 2);
        } else if (currentCarModel === 'koenig') {
            ctx.fillRect(-15 + 2, 34 - 1, 4, 2);
            ctx.fillRect(15 - 6, 34 - 1, 4, 2);
        } else if (currentCarModel === 'audi') {
            ctx.fillRect(-16 + 1, 33 - 1, 5, 2);
            ctx.fillRect(16 - 6, 33 - 1, 5, 2);
        } else if (currentCarModel === 'mark2') {
            // Легендарный сплошной "фонарь" Марка на всю ширину задницы
            ctx.fillStyle = (keys.s || keys[' ']) ? '#ff1111' : '#770000';
            ctx.fillRect(-currentW + 1, currentH - 2, (currentW * 2) - 2, 2);

            // Маленькие оранжевые поворотники по самым краям фонаря
            ctx.fillStyle = '#ff9900';
            ctx.fillRect(-currentW + 1, currentH - 2, 2, 2);
            ctx.fillRect(currentW - 3, currentH - 2, 2, 2);
        } else {
            ctx.fillStyle = (keys.s || keys[' ']) ? '#ff1111' : '#550000';
            ctx.fillRect(-11, 24, 4, 2);
            ctx.fillRect(7, 24, 4, 2);
        }


        // Колёса
        ctx.fillStyle = '#0a0a0c';
        const { frontY, backY, wheelW } = dims;

        // Передние колеса (с поворотом)
        ctx.save();
        ctx.translate(-wheelW, frontY);
        ctx.rotate(car.steerAngle);
        ctx.fillRect(-3, -6, 6, 13);
        ctx.restore();

        ctx.save();
        ctx.translate(wheelW, frontY);
        ctx.rotate(car.steerAngle);
        ctx.fillRect(-3, -6, 6, 13);
        ctx.restore();

        // Задние колеса (прямые)
        ctx.fillRect(-wheelW - 1, backY, 6, 13);
        ctx.fillRect(wheelW - 5, backY, 6, 13);

        ctx.restore();
    }


    // ==========================================
    // ОСНОВНОЙ ЦИКЛ
    // ==========================================
    let speedScalar = 0;
    let driftSlip = 0;

    function loop() {
        if (!isRunning) return;
        requestAnimationFrame(loop);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ФИЗИКА
        speedScalar = Math.sqrt((car.vx * car.vx) + (car.vy * car.vy)) || 0;

        // Руль
        let steerInput = 0;
        if (keys.a || keys.A || keys.ф || keys.Ф) steerInput = -1;
        if (keys.d || keys.D || keys.в || keys.В) steerInput = 1;

        if (steerInput !== 0) {
            car.steerAngle = Math.max(Math.min(car.steerAngle + steerInput * 0.05, car.maxSteer), -car.maxSteer);
        } else {
            car.steerAngle *= 0.70;
        }

        // Газ и тормоз
        if (keys.w || keys.W || keys.ц || keys.Ц) car.speed = Math.min(car.speed + car.power, car.maxSpeedPhys);
        if (keys.s || keys.S || keys.ы || keys.Ы) car.speed = Math.max(car.speed - car.brake, -car.maxSpeedPhys / 3);
        if (!keys.w && !keys.s && !keys.W && !keys.S) car.speed *= 0.97;

        // Дрифт
        if (keys[' '] && speedScalar > 2.0) {
            isDrifting = true;
        } else {
            isDrifting = false;
        }

        let cosA = Math.cos(car.angle);
        let sinA = Math.sin(car.angle);
        let targetVx = sinA * car.speed;
        let targetVy = -cosA * car.speed;

        let localVx = car.vx * Math.cos(car.angle) + car.vy * Math.sin(car.angle);
        let localVy = -car.vx * Math.sin(car.angle) + car.vy * Math.cos(car.angle);
        driftSlip = Math.abs(localVx);

        if (isDrifting) {
            car.vx = car.vx * 0.98 + targetVx * 0.02;
            car.vy = car.vy * 0.98 + targetVy * 0.02;
        } else {
            let gripFactor = 0.15;
            if (driftSlip > 1.5) gripFactor = 0.05;
            else if (driftSlip > 0.6) gripFactor = 0.10;
            car.vx += (targetVx - car.vx) * gripFactor;
            car.vy += (targetVy - car.vy) * gripFactor;
        }

        // Вращение
        if (speedScalar > 0.8) {
            if (isDrifting) {
                car.angularVelocity += car.steerAngle * localVy * 0.0006 - localVx * 0.0007;
            } else {
                car.angularVelocity = car.steerAngle * car.speed * 0.004;
            }
        }

        car.angularVelocity *= isDrifting ? 0.82 : 0.68;
        car.angle += car.angularVelocity;

        car.x = (car.x + car.vx) || canvas.width / 2;
        car.y = (car.y + car.vy) || canvas.height / 2;

        // СЛЕДЫ И ДЫМ
        let sideX = Math.cos(car.angle);
        let sideY = Math.sin(car.angle);
        let leftTrackX = car.x - sideX * 12;
        let leftTrackY = car.y - sideY * 12;
        let rightTrackX = car.x + sideX * 12;
        let rightTrackY = car.y + sideY * 12;

        if (isDrifting && speedScalar > 2.0 && driftSlip > 0.8) {
            tireTracks.push({x1: leftTrackX, y1: leftTrackY, x2: rightTrackX, y2: rightTrackY, alpha: 1.0});
            if (Math.random() < 0.4) {
                smokeParticles.push({
                    x: leftTrackX, y: leftTrackY,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: 6, alpha: 0.8
                });
                smokeParticles.push({
                    x: rightTrackX, y: rightTrackY,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: 6, alpha: 0.8
                });
            }
        }

        if (tireTracks.length > 1500) tireTracks.shift();
        if (smokeParticles.length > 400) smokeParticles.shift();

        // ОЧКИ И ТАЙМЕРЫ
        if (collisionTextTimer > 0) collisionTextTimer--;

        if (collisionTextTimer === 0 && !isDrifting) {
            driftScoreEl.style.color = "#ffffff";
            driftScoreEl.innerText = "DRIVE AND DRIFT";
        }

        if (isDrifting && speedScalar > 2.0 && driftSlip > 0.8) {
            if (collisionTextTimer === 0) {
                currentDriftScore += Math.floor(driftSlip * 15 * driftMultiplier);
                driftMultiplier = Math.min(driftMultiplier + 0.006, 5.0);
                driftScoreEl.innerText = currentDriftScore.toString();
                driftMultEl.style.visibility = 'visible';
                driftMultEl.innerText = `x${driftMultiplier.toFixed(1)} ASPHALT COMBO`;
                driftScoreEl.style.color = "#ffcc00";
            }
        } else {
            if (currentDriftScore > 0 && collisionTextTimer === 0) {
                totalPoints += currentDriftScore;
                currentDriftScore = 0;
                driftMultiplier = 1.0;
                totalScoreVal.innerText = totalPoints.toString().padStart(6, '0');
            }
        }

        // КОЛЛИЗИИ
        if (collisionCooldown > 0) collisionCooldown--;

        for (let i = 0; i < containers.length; i++) {
            if (checkCarCollisionWithContainer(containers[i])) {
                if (collisionCooldown === 0) {
                    playCrashSound();
                    currentDriftScore = 0;
                    driftMultiplier = 1.0;
                    isDrifting = false;
                    totalPoints = Math.max(0, totalPoints - 100);
                    totalScoreVal.innerText = totalPoints.toString().padStart(6, '0');
                    collisionTextTimer = 60;
                    collisionCooldown = 90;
                    driftScoreEl.innerText = "-100 ОЧКОВ";
                    driftScoreEl.style.color = "#ff3333";
                    driftMultEl.style.visibility = 'hidden';
                }
                break;
            }
        }

        // РЕНДЕРИНГ
        renderWorld();

        // HUD
        let gX = (car.vx * Math.cos(car.angle) + car.vy * Math.sin(car.angle)) * 3.5;
        let gY = (-car.vx * Math.sin(car.angle) + car.vy * Math.cos(car.angle)) * 3.5;
        let gDist = Math.sqrt(gX * gX + gY * gY);
        if (gDist > 45) {
            gX = (gX / gDist) * 45;
            gY = (gY / gDist) * 45;
        }
        gDot.style.transform = `translate(${gX}px, ${gY}px)`;

        let maxHUD = carSpecs[currentCarModel].maxSpeedHUD;
        let speedometerValue = Math.round((speedScalar / car.maxSpeedPhys) * maxHUD);
        if (speedometerValue > maxHUD) speedometerValue = maxHUD;
        speedometer.innerText = speedometerValue.toString().padStart(3, '0');

        // ЗВУКИ
        if (audioCtx && motorOsc && motorGain && screechGain && screechFilter) {
            let motorPitch = 45 + (speedScalar / car.maxSpeedPhys) * 110;
            motorOsc.frequency.setTargetAtTime(motorPitch, audioCtx.currentTime, 0.05);

            let targetMotorVolume = (keys.w || keys.W || keys.ц || keys.Ц) ? 0.15 : 0.08;
            if (speedScalar < 0.2) targetMotorVolume = 0.03;
            motorGain.gain.setTargetAtTime(targetMotorVolume, audioCtx.currentTime, 0.1);

            if (isDrifting && speedScalar > 2.0 && driftSlip > 0.8) {
                let targetScreechVol = Math.min(0.35, (driftSlip - 0.8) * 0.22);
                screechGain.gain.setTargetAtTime(targetScreechVol, audioCtx.currentTime, 0.04);
                let filterFreq = 260 + (driftSlip * 45);
                screechFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.03);
            } else {
                screechGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.15);
            }
        }
    }
    function renderWorld() {
        ctx.save();
        let shakeIntensity = (isDrifting && speedScalar > 2 && driftSlip > 1.3) ? (Math.random() - 0.5) * (driftSlip * 1.3) : 0;
        ctx.translate(width / 2 + shakeIntensity, height / 2 + shakeIntensity);

        // Асфальт
        ctx.fillStyle = '#1c1f26';
        ctx.fillRect(-width, -height, width * 2, height * 2);

        // Разметка
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        roadLines.forEach(line => {
            ctx.save();
            let rx = ((line.x - car.x) % 2500 + 2500) % 2500 - 1250;
            let ry = ((line.y - car.y) % 2500 + 2500) % 2500 - 1250;
            ctx.translate(rx, ry);
            ctx.rotate(line.angle);
            ctx.fillRect(-line.w / 2, -line.h / 2, line.w, line.h);
            ctx.restore();
        });

        // Следы шин
        tireTracks.forEach(t => {
            t.alpha -= 0.0004;
            if (t.alpha > 0) {
                ctx.fillStyle = `rgba(10, 12, 15, ${t.alpha})`;
                ctx.fillRect(t.x1 - car.x, t.y1 - car.y, 3.5, 3.5);
                ctx.fillRect(t.x2 - car.x, t.y2 - car.y, 3.5, 3.5);
            }
        });

        // Контейнеры
        containers.forEach(box => {
            ctx.save();
            ctx.translate(box.x - car.x, box.y - car.y);
            ctx.rotate(box.angle);
            ctx.fillStyle = 'rgba(5, 6, 8, 0.35)';
            ctx.fillRect(-box.w / 2 + 8, -box.h / 2 + 8, box.w, box.h);
            ctx.fillStyle = box.color;
            ctx.fillRect(-box.w / 2, -box.h / 2, box.w, box.h);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            for (let step = -box.w / 2 + 8; step < box.w / 2; step += 12) {
                ctx.fillRect(step, -box.h / 2 + 4, 3, box.h - 8);
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = 'bold 8px Share Tech Mono';
            ctx.fillText("MRK-350-UA", -box.w / 2 + 10, 0);
            ctx.restore();
        });

        // Дым
        smokeParticles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.size += 0.55;
            p.alpha -= 0.012;
            if (p.alpha > 0) {
                ctx.fillStyle = `rgba(225, 230, 240, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x - car.x, p.y - car.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // Машина
        if (collisionCooldown === 0 || Math.floor(collisionCooldown / 4) % 2 === 0) {
            drawCar();
        }

        ctx.restore();
    }

    updateBalanceUI();
    updateBalanceUI();
</script>
